<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAMONFILM - Accueil</title>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #e50914; margin-bottom: 30px; font-size: 32px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 20px 5%;
        }
        .movie-card {
            background-color: #1c1c1c;
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
            transition: transform 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: white;
            border: 1px solid #333;
        }
        .movie-card:hover { transform: scale(1.05); border-color: #e50914; }
        .movie-card img { width: 100%; height: 270px; object-fit: cover; display: block; }
        .movie-card p { padding: 12px; margin: 0; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>YAMONFILM</h1>
    <div class="grid" id="catalog"></div>

    <script>
        // Ta vraie clé API TMDb intégrée
        const API_KEY = '182c7173698e34803715eacab5c693a7'; 

        // AJOUTE OU RETIRE TES FILMS ET SÉRIES ICI :
        // 'movie' pour un film, 'tv' pour une série
        const maSelection = [
            { id: 600, type: 'tv' },         /* Le Rebelle (Série) */
            { id: 550, type: 'movie' },       /* Fight Club (Film) */
            { id: 27205, type: 'movie' },     /* Inception (Film) */
            { id: 1396, type: 'tv' }          /* Breaking Bad (Série) */
        ];

        const catalog = document.getElementById('catalog');

        maSelection.forEach(item => {
            fetch(`https://api.themoviedb.org/3/${item.type}/${item.id}?api_key=${API_KEY}&language=fr-FR`)
                .then(response => response.json())
                .then(media => {
                    const movieCard = document.createElement('a');
                    movieCard.className = 'movie-card';
                    
                    // Envoie vers la page de lecture avec l'ID et le type (film ou série)
                    movieCard.href = `player.html?id=${media.id}&type=${item.type}`;

                    const posterUrl = media.poster_path 
                        ? `https://image.tmdb.org/t/p/w500${media.poster_path}`
                        : 'https://via.placeholder.com/500x750/222/fff?text=Pas+d%27image';

                    const nomDuMedia = media.title || media.name;

                    movieCard.innerHTML = `
                        <img src="${posterUrl}" alt="${nomDuMedia}">
                        <p>${nomDuMedia}</p>
                    `;
                    
                    catalog.appendChild(movieCard);
                })
                .catch(error => console.error("Erreur avec l'ID " + item.id, error));
        });
    </script>
</body>
</html>
